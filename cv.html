<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NITHISH R - CV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            background: #f5f5f5;
        }
        .image-container {
            width: 450px;
            height: 650px;
            max-width: 95vw;
            max-height: 95vh;
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            position: relative;
        }
        .profile-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            border-radius: 15px;
            display: block;
        }
        .download-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #00ff88;
            color: #020b14;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(0,255,136,0.3);
            transition: all 0.3s ease;
            z-index: 10;
        }
        .download-btn:hover {
            background: #00cc6a;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,255,136,0.4);
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 16px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 10;
        }
        .back-btn:hover {
            background: rgba(0,0,0,0.9);
            transform: translateX(-2px);
        }
        @media print { 
            body { background: white; } 
            .image-container { box-shadow: none; max-width: 100%; }
            .back-btn, .download-btn { display: none; }
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img src="profile.png" alt="NITHISH R" class="profile-image">
        <a href="index.html" class="back-btn">← BACK TO PORTFOLIO</a>
        <a href="profile.png" download="Nithish_R_Profile.jpg" class="download-btn">📥 DOWNLOAD</a>
    </div>
</body>
</html>
